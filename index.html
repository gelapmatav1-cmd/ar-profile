<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar • Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #18181b 0%, #27272a 100%); }
        .link-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .link-card:hover { transform: scale(1.05) translateY(-4px); box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
        .avatar-glow { box-shadow: 0 0 40px rgba(234, 179, 8, 0.5); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen hero-bg">
    <div class="max-w-xl mx-auto px-6 py-12">
        
        <div class="text-center mb-12">
            <div class="relative w-32 h-32 mx-auto mb-6">
                <img id="avatar-img" 
                     src="https://picsum.photos/id/64/300/300" 
                     alt="Avatar" 
                     class="avatar-glow w-full h-full rounded-3xl object-cover border-4 border-amber-400">
            </div>
            
            <h1 id="display-name" class="text-5xl font-bold tracking-tighter mb-1">Ar</h1>
            <p id="display-username" class="text-xl text-amber-300">@aryanxsikak</p>
            <p id="display-location" class="text-zinc-400 mt-1">Jakarta, Indonesia </p>
            
            <div class="mt-6 max-w-xs mx-auto">
                <p id="display-bio" class="text-zinc-300 text-sm leading-relaxed">
                    Halo! Saya Ar (Aryan Sikak). Pecinta fotografi,makan, kopi, dan segala hal random. 
                    Ini profile pribadi saya. Connect yuk!
                </p>
            </div>
        </div>

        <!-- SOCIAL LINKS (hanya tampilan) -->
        <div id="social-grid" class="space-y-4">
            <!-- Diisi oleh JS -->
        </div>

        <div class="mt-16 text-center text-xs text-zinc-500">
            <p>hanya haha hihi saja</p>
        </div>
    </div>

    <script>
        let profileData = {
            avatar: "https://i.ibb.co/mFy0d7r9/20260103-182006-0000.png",  // Ganti dengan link foto kamu
            name: "Ar",
            username: "@aryanxsikak",
            location: "Wonosobo, Indonesia ",
            bio: "Halo! Saya Ar (Aryan Sikak). Pecinta Fotografi, kopi, dan segala hal random. Ini profile pribadi saya. Connect yuk!",
            socials: {
                x: { handle: "@aryanxsikak", url: "https://x.com/aryanxsikak" },
                ig: { handle: "aryanbee1226", url: "https://www.instagram.com/aryanbee1226?igsh=MzBwb2Fkdmhoanll" },
                telegram: { handle: "@Gelapmatav1226", url: "https://t.me/Gelapmatav1226" },
                email: { handle: "gelapmatav1@gmail.com", url: "mailto:gelapmatav1@gmail.com" }
            }
        }

        function renderProfile() {
            document.getElementById('avatar-img').src = profileData.avatar
            document.getElementById('display-name').textContent = profileData.name
            document.getElementById('display-username').textContent = profileData.username
            document.getElementById('display-location').textContent = profileData.location
            document.getElementById('display-bio').textContent = profileData.bio

            const grid = document.getElementById('social-grid')
            grid.innerHTML = ''

            grid.innerHTML += createLinkCard('x', '𝕏', 'X / Twitter', profileData.socials.x.handle, profileData.socials.x.url, '#000')
            grid.innerHTML += createLinkCard('ig', '📷', 'Instagram', profileData.socials.ig.handle, profileData.socials.ig.url, 'linear-gradient(to right, #f56040, #c13584)')
            grid.innerHTML += createLinkCard('telegram', '✈️', 'Telegram', profileData.socials.telegram.handle, profileData.socials.telegram.url, '#229ED9')
            grid.innerHTML += createLinkCard('email', '✉️', 'Email', profileData.socials.email.handle, profileData.socials.email.url, '#ea4335')
        }

        function createLinkCard(key, icon, title, handle, url, color) {
            return `
                <a href="${url}" target="_blank" class="link-card bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl p-6 flex items-center gap-5 group">
                    <div style="background: ${color}" class="w-12 h-12 rounded-2xl flex items-center justify-center text-3xl text-white">
                        ${icon}
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-lg group-hover:text-amber-400 transition-colors">${title}</p>
                        <p class="text-zinc-400 text-sm">${handle}</p>
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square text-2xl text-zinc-500 group-hover:text-amber-400 transition-colors"></i>
                </a>
            `
        }

        window.onload = () => {
            tailwind.config = { content: [], theme: { extend: {} } }
            renderProfile()
        }
    </script>
</body>
</html>
